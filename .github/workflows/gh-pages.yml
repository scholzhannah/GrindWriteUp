name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        if: github.repository == 'scholzhannah/GrindWriteUp'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: leanprover/lean-action@v1
              with:
                  test: false

            - name: Build document
              run: lake exe textbook

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: _out

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4